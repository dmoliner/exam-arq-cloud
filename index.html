<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Examen Perfil Cloud - DIBA</title>
</head>

<body>

    <div class="container" id="quiz-container">
        <h1 id="title">Examen Perfil Cloud - DIBA</h1>
        <div id="progress">Pregunta 1 de 50</div>
        <div id="question-text" style="margin: 20px 0; font-weight: bold;"></div>
        <div id="options-container"></div>

        <div id="justificacio-container" class="justificacio-box">
            <strong>Justificació tècnica:</strong>
            <p id="justificacio-text"></p>
        </div>

        <div class="controls">
            <button id="btn-progres" onclick="mostrarProgres()">Veure progrés</button>
            <button id="btn-seguent">Següent</button>
        </div>
    </div>

    <div class="container" id="progres-screen" style="display:none;">
        <h1>Estat del Progrés</h1>
        <div style="width: 250px; margin: 20px auto;">
            <canvas id="donutChartProgres"></canvas>
        </div>
        <button
            onclick="document.getElementById('progres-screen').style.display='none'; document.getElementById('quiz-container').style.display='block';">Tornar
            al test</button>
    </div>

    <div class="container" id="result-screen">
        <h1>Resultats Finals</h1>
        <div style="width: 250px; margin: 20px auto;">
            <canvas id="donutChartFinal"></canvas>
        </div>
        <div id="final-score" style="font-size: 1.2em; margin: 20px 0;"></div>
        <button onclick="location.reload()">Tornar a començar</button>
    </div>

    <script src="preguntes.js"></script>
    <script src="app.js"></script>
</body>

</html>
